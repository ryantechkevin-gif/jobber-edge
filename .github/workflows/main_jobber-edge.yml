# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - jobber-edge

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: '3.11' # set this to the python version to use (supports 3.6, 3.7, 3.8)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Installed directly into .python_packages/lib/site-packages -- the
      # exact path the Azure Functions Python worker puts on sys.path -- so
      # dependencies are present in the deployed zip itself, rather than
      # relying on a remote build step to install them server-side. A venv
      # here doesn't help: each `run:` step is a fresh shell, so activating
      # one in a prior step has no effect on this one anyway. (Portal's
      # default template creates a venv, installs into it, then excludes
      # venv/ from the zip -- shipping zero dependencies. Same fix already
      # applied in unifi-edge/starlink-edge's workflows -- gets reverted by
      # Azure every time Deployment Center reconnects, so re-apply this if
      # that happens again.)
      - name: Install dependencies
        run: pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      # Optional: Add step to run tests here

      # `./*` is a shell glob and does NOT match dotfiles/dot-directories,
      # so .python_packages would be silently excluded from the archive if
      # not listed explicitly.
      - name: Zip artifact for deployment
        run: zip release.zip ./* .python_packages -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: |
          unzip release.zip
          rm release.zip
        
      # Generic secret names (not tied to an auto-generated GUID) --
      # manually created App Registration + federated credential in Entra
      # ID, since Deployment Center's automatic provisioning silently
      # failed twice in a row (AADSTS700213, App Registration never
      # actually existed for either client ID it generated). If this ever
      # needs recreating, only these secret values change, not the
      # workflow file.
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'jobber-edge'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          