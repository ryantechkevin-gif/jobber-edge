# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - jobber-edge

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: '3.11' # set this to the python version to use (supports 3.6, 3.7, 3.8)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Installed directly into .python_packages/lib/site-packages -- the
      # exact path the Azure Functions Python worker puts on sys.path -- so
      # dependencies are present in the deployed zip itself, rather than
      # relying on a remote build step to install them server-side. A venv
      # here doesn't help: each `run:` step is a fresh shell, so activating
      # one in a prior step has no effect on this one anyway. (Portal's
      # default template creates a venv, installs into it, then excludes
      # venv/ from the zip -- shipping zero dependencies. Same fix already
      # applied in unifi-edge/starlink-edge's workflows -- gets reverted by
      # Azure every time Deployment Center reconnects, so re-apply this if
      # that happens again.)
      - name: Install dependencies
        run: pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      # Optional: Add step to run tests here

      # `./*` is a shell glob and does NOT match dotfiles/dot-directories,
      # so .python_packages would be silently excluded from the archive if
      # not listed explicitly.
      - name: Zip artifact for deployment
        run: zip release.zip ./* .python_packages -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  # Uses a Publish Profile (basic-auth deployment credential) instead of
  # OIDC/federated-identity login -- Deployment Center's automatic identity
  # provisioning kept failing (AADSTS700213: no matching federated identity
  # record found), and the App Registration it referenced never actually
  # existed in Entra ID, most likely a tenant permission restriction on
  # creating App Registrations. This sidesteps that entirely: download the
  # publish profile from the jobber-edge Function App's Overview page in
  # the Azure Portal ("Get publish profile"), and store its full contents
  # as the AZURE_FUNCTIONAPP_PUBLISH_PROFILE repo secret.
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: |
          unzip release.zip
          rm release.zip

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'jobber-edge'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
